---
- name: "{{ endpoint.name }} :: SSL profiles"
  include_tasks: ssl.yml
  when: endpoint.ssl is defined

- name: "{{ endpoint.name }} :: pool {{ endpoint.pool.name }}"
  bigip_pool:
    provider: "{{ f5_provider }}"
    name: "{{ endpoint.pool.name }}"
    lb_method: "{{ endpoint.pool.lb_method | default('round-robin') }}"
    monitors:
      - "{{ endpoint.pool.monitor | default('/Common/http') }}"
    partition: "{{ endpoint.partition | default('Common') }}"
    state: present

- name: "{{ endpoint.name }} :: pool members"
  bigip_pool_member:
    provider: "{{ f5_provider }}"
    pool: "{{ endpoint.pool.name }}"
    host: "{{ item.host }}"
    port: "{{ item.port | default(80) }}"
    partition: "{{ endpoint.partition | default('Common') }}"
    state: present
  loop: "{{ endpoint.pool.members }}"
  loop_control:
    label: "{{ item.host }}:{{ item.port | default(80) }}"

- name: "{{ endpoint.name }} :: virtual server"
  bigip_virtual_server:
    provider: "{{ f5_provider }}"
    name: "{{ endpoint.name }}"
    destination: "{{ endpoint.destination }}"
    port: "{{ endpoint.port }}"
    pool: "{{ endpoint.pool.name }}"
    snat: "{{ endpoint.snat | default('Automap') }}"
    profiles: "{{ endpoint_profiles }}"
    partition: "{{ endpoint.partition | default('Common') }}"
    state: present
  vars:
    base_profiles: "{{ endpoint.profiles | default(['http']) }}"
    clientssl_profile: >-
      {{ [endpoint.ssl.clientssl.profile] if (endpoint.ssl.clientssl.profile is defined) else [] }}
    serverssl_profile: >-
      {{ [endpoint.ssl.serverssl.profile] if (endpoint.ssl.serverssl is defined and endpoint.ssl.serverssl.profile is defined) else [] }}
    endpoint_profiles: "{{ (base_profiles + clientssl_profile + serverssl_profile) | unique | list }}"
