---
# Lab single-box BIG-IP — runs both LTM and GTM (primary).
# In production each device file usually defines a subset of these.

ansible_host: 192.168.80.130

# ----- LTM endpoints -----
ltm_endpoints:
  - name: api_vs
    destination: 192.168.1.100
    port: 443
    snat: Automap
    profiles:
      - http
      - clientssl
    pool:
      name: api_pool
      lb_method: round-robin
      monitor: /Common/http
      members:
        - { host: 10.1.1.10, port: 80 }
        - { host: 10.1.1.11, port: 80 }

  # Smoke-test endpoint — exercises every block in the ltm_api role.
  # APM and WAF are commented out: lab v13.1.0.1 likely isn't provisioned
  # for them. Run on the BIG-IP first to enable:
  #   tmsh modify sys provision apm level nominal
  #   tmsh modify sys provision asm level nominal
  - name: api_smoke_vs
    destination: 192.168.1.101
    port: 443
    snat: Automap
    profiles:
      - http
    monitor:
      name: api_smoke_https
      type: https
      send: "GET /healthz HTTP/1.1\r\nHost: smoke.example.com\r\nConnection: close\r\n\r\n"
      receive: "200 OK"
      interval: 5
      timeout: 16
      port: 443
    ssl:
      clientssl:
        profile: api_smoke_clientssl
        cert_name: default
        key_name: default
        parent: /Common/clientssl
    irules:
      - name: api_smoke_uri_routing
        src: files/irules/api_uri_routing.tcl
    rate_limit:
      connections_per_sec: 1000
      mode: object
      rate_class:
        name: api_smoke_rc
        rate: 10mbps
        direction: any
        burst_size: 0
    # apm:
    #   access_profile: api_smoke_oauth
    #   policy_src: playbooks/files/apm/api_smoke_oauth.tar.gz
    # waf:
    #   policy_name: api_smoke_waf
    #   template: POLICY_TEMPLATE_API_SECURITY
    #   active: true
    pool:
      name: api_smoke_pool
      lb_method: round-robin
      members:
        - { host: 10.1.1.20, port: 443 }
        - { host: 10.1.1.21, port: 443 }

# ----- GSLB topology (only meaningful on hosts in f5_gtm_primary) -----
gtm_datacenters:
  - name: dc1
    # location: "Phoenix"     # optional
    # contact: "netops@..."   # optional
    # description: "..."      # optional

gtm_servers:
  - name: ltm1
    datacenter: dc1
    address: 192.168.80.130
    virtual_servers:
      - { name: api_vs, address: 192.168.1.100, port: 443 }

gslb_pools:
  - name: api_gslb_pool
    monitor: /Common/http
    members:
      - { server_name: ltm1, virtual_server: api_vs }

gslb_widips:
  - name: api.example.com
    pool_lb_method: round-robin
    pools:
      - { name: api_gslb_pool }

gslb_listeners:
  - name: dns_listener_v4
    address: 192.168.152.10
    port: 53
    ip_protocol: udp
  - name: dns_listener_v4_tcp
    address: 192.168.152.10
    port: 53
    ip_protocol: tcp
